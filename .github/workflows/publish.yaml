name: Publish Electron

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '.github/**'
      - '*.md'
  workflow_dispatch: ~

jobs:
  update-submodules:
    name: Build and Publish (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: windows-latest
            platform: windows-amd64

    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            BSnapshot
            bsnapshot-web

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            backend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install
          pnpm -C ./backend install

      - name: Install dependencies for darwin
        if: ${{ matrix.platform == 'darwin' }}
        run: pnpm -C ./backend install @libsql/darwin-x64

      - name: Build
        run: pnpm build
        env:
          VITE_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Make Electron
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: pnpm run make:electron

      - name: Upload Artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: bsnapshot-electron-${{ matrix.platform }}
          path: out/make/

      - name: Publish Electron
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: pnpm run publish:electron
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
